<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>Calculadora</h1>

    <div id="calculator">

        <form method="POST" action="{{ url_for('index') }}">

            <div class="form-grupo">
                <label for="num1">Primeiro número</label>

                <input type="number"
                       id="num1"
                       name="num1"
                       step="any"
                       required
                       value="{{ request.form.get('num1', '') }}">
            </div>

            {% set op = request.form.get('operacao', '+') %}

            <div class="form-grupo">
                <label for="operacao">Operação</label>

                <select id="operacao"
                        name="operacao"
                        required>

                    <option value="+" {% if op == '+' %}selected{% endif %}>
                        + Somar
                    </option>

                    <option value="-" {% if op == '-' %}selected{% endif %}>
                        − Subtrair
                    </option>

                    <option value="*" {% if op == '*' %}selected{% endif %}>
                        × Multiplicar
                    </option>

                    <option value="/" {% if op == '/' %}selected{% endif %}>
                        ÷ Dividir
                    </option>

                    <option value="**" {% if op == '**' %}selected{% endif %}>
                        ^ Potência
                    </option>

                    <option value="sqrt" {% if op == 'sqrt' %}selected{% endif %}>
                        √ Raiz quadrada
                    </option>

                    <option value="bhaskara" {% if op == 'bhaskara' %}selected{% endif %}>
                        Bhaskara
                    </option>

                    <option value="log" {% if op == 'log' %}selected{% endif %}>
                        Log
                    </option>

                </select>
            </div>

            {% if op != 'sqrt' %}

            <div class="form-grupo">
                <label for="num2">Segundo número</label>

                <input type="number"
                       id="num2"
                       name="num2"
                       step="any"
                       required
                       value="{{ request.form.get('num2', '') }}">
            </div>

            {% endif %}

            <button type="submit">Calcular</button>

        </form>

        {% if etapas %}
        <div class="resultado">
            <strong>Resposta do servidor (Python):</strong>

            <div>{{ etapas }}</div>

            <div>Resultado: {{ resultados }}</div>
        </div>
        {% endif %}

        <a href="{{ url_for('index') }}">
            Limpar / nova conta
        </a>

    </div>

</body>
</html>
